name: prod_agent_sweep
description: "OpenAI agent processor evaluation on production clinical notes dataset"

# Environment configuration
environment_config:
  # Import environment paths and settings
  import: "config/environments/production.yaml"
  # Override only the specific settings we want to change
  runtime:
    max_samples: 100
    use_azure: true
    azure_endpoint: "https://bwh-bittermanlab-nonprod-openai-service.openai.azure.com/"
    deployment_name: "gpt-4.1-mini"
    run_gold_error_eval: false
    patient_level_eval: false
  # Add explicit logging configuration
  logging:
    level: "INFO"
    save_intermediate: true
    token_tracking: true
  parameters:
    event_types:
      - "pneumonitis"
      - "myocarditis"
      - "colitis"
      - "thyroiditis"
      - "hepatitis"
      - "dermatitis"

# Override settings
overrides:
  max_parallel: 1  # Run experiments sequentially to avoid resource contention
  max_concurrent_runs: 3  # Consistent with parameters value below (concurrency for OpenAI API calls)

# Experiment configurations
experiments: 

  # Baselines
  - name: regex_default
    graph_type: regex
    model_configs: 
      - default
    parameters:
      configure_azure: false
      batch_size: 100
    prompt_variant: "default"
    description: "Regex pattern matching baseline"

  - name: zeroshot_default
    graph_type: openai_zeroshot
    model_configs: 
      - 4.1-mini
      - 4.1-nano
      - o4-mini
    parameters:
      configure_azure: true
      batch_size: 100
    prompt_variant: "default"
    description: "Default zeroshot configuration"

  # OpenAI Agent
  - name: openai_agent_default
    graph_type: openai_agent
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      configure_azure: true
      batch_size: 100 
    prompt_variant: "default"
    description: "OpenAI Agent SDK processor with optimized settings"
  
  - name: openai_agent_no_judge
    graph_type: openai_agent
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      configure_azure: true
      batch_size: 100 
    prompt_variant: "ablation_no_judge"
    description: "OpenAI Agent SDK processor with optimized settings"
  
  - name: openai_agent_single_identifier
    graph_type: openai_agent
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      configure_azure: true
      batch_size: 100 
    prompt_variant: "ablation_single"
    description: "OpenAI Agent SDK processor with optimized settings"

  # Split Temporality
  - name: split_temporality_default
    graph_type: agent_split_temporality
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      force_azure_config: true
      batch_size: 100
    prompt_variant: "default"
    description: "Testing split temporality workflow with separate identification and temporal classification"

  - name: split_temporality_no_judge
    graph_type: agent_split_temporality
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      force_azure_config: true
      batch_size: 100
    prompt_variant: "ablation_no_judge"
    description: "Testing split temporality workflow with separate identification and temporal classification"

  - name: split_temporality_single_identifier
    graph_type: agent_split_temporality
    model_configs: 
      - 4.1-mini
      - 4.1-nano
    parameters:
      force_azure_config: true
      batch_size: 100
    prompt_variant: "ablation_single"
    description: "Testing split temporality workflow with separate identification and temporal classification"