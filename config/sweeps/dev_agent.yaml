name: dev_agent_sweep
description: "OpenAI agent processor evaluation on clinical notes"

environment: development  # Use development environment

# Environment configuration
environment_config:
  name: development
  # Import environment paths and settings
  import: "config/environments/development.yaml"
  # Override only the specific settings we want to change
  runtime:
    max_samples: 5  # Use moderate sample size for dev testing
    use_azure: true
    azure_endpoint: "https://bwh-bittermanlab-nonprod-openai-service.openai.azure.com/"
    deployment_name: "gpt-4o-mini-jg"
    run_gold_error_eval: false  
  parameters:
    event_types:
      - "pneumonitis"
      - "myocarditis"
      - "colitis"
      - "thyroiditis"
      - "hepatitis"
      - "dermatitis"
  logging:
    level: "INFO"

# Override settings
overrides:
  max_parallel: 1  # Run experiments sequentially to avoid resource contention
  max_concurrent_runs: 2

# Experiment configurations
