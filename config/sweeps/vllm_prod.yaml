name: vllm_prod_sweep
description: "vLLM model evaluation on clinical notes - production mode with full dataset"

# Environment configuration
environment_config:
  import: "config/environments/production.yaml"
  runtime:
    use_azure: false  # vLLM doesn't use Azure
    vllm_endpoint: "http://localhost:8000/v1"  # Default vLLM endpoint
    run_gold_error_eval: true  # Enable full evaluation in production
  parameters:
    event_types:
      - "pneumonitis"
      - "myocarditis"
      - "colitis"
      - "thyroiditis"
      - "hepatitis"
      - "dermatitis"
  logging:
    level: "INFO"

# Override settings
overrides:
  max_parallel: 1  # Run experiments sequentially
  max_concurrent_runs: 5  # Higher concurrency for production

# Experiment configurations
# IMPORTANT: Comment out all models except the one you're currently serving
experiments: 

  # Baselines - Zeroshot
  - name: vllm_zeroshot_default
    graph_type: openai_zeroshot
    model_configs: 
      # Uncomment ONE model that matches your running vLLM server:
      - vllm-qwen3-32b
      # - vllm-gemma3-27b
      # - vllm-deepseek-r1-8b
      # - vllm-deepseek-r1-distill-qwen-32b
      # - vllm-qwen3-8b
      # - vllm-qwen3-14b
      # - vllm-gemma3-4b
      # - vllm-gemma3-12b
      # - vllm-medgemma3-27b
    parameters:
      batch_size: 50  # Larger batch for production
      vllm_endpoint: "http://localhost:8000/v1"
    prompt_variant: "default"
    description: "vLLM zeroshot baseline - production"

  - name: regex_default
    graph_type: regex
    model_configs: 
      - default
    parameters:
      configure_azure: false
      batch_size: 50
    prompt_variant: "default"
    description: "Regex pattern matching baseline"


