  4o-mini: {}
  4.1-mini: {}
  4.1-nano: {}
  o3-mini: {}
  o4-mini: {}
  o3-judge: {}
  o3-middle: {}
  ollama-deepseek-1b: {}
  ollama-deepseek-8b: {}
  ollama-deepseek-14b: {}
  ollama-llama-1b: {}
  4.1-mini: {}
