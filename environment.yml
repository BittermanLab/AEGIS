name: irae-graph
channels:
  - conda-forge
dependencies:
  # Python runtime
  - python=3.10
  
  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.10.0
  
  # Data visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  
  # Jupyter for development/debugging
  - jupyter
  - ipykernel
  - notebook
  
  # Configuration and utilities
  - pyyaml>=6.0
  - python-dotenv>=1.0.0
  - tqdm>=4.65.0
  - requests>=2.31.0
  
  # Development tools
  - pytest>=7.0.0
  - black
  - flake8
  
  # Install via pip (packages not available in conda-forge)
  - pip
  - pip:
    # OpenAI and Azure integration
    - openai>=1.60.0
    - openai-agents>=0.0.4
    - azure-identity>=1.15.0
    - azure-core>=1.29.0
    - azure-storage-blob>=12.19.0
    
    # HTTP and async libraries
    - httpx>=0.25.0
    - anyio>=4.0.0
    
    # Data processing
    - pydantic>=2.5.0
    - jiter>=0.5.0
    
    # Authentication and security
    - msal>=1.24.0
    - msal-extensions>=1.0.0
    - cryptography>=41.0.0
    
    # Additional utilities
    - joblib>=1.3.0
    - pytz>=2023.3
    - tzdata>=2023.3
    - types-requests>=2.31.0